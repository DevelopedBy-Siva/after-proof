name: Deploy Defendly

on:
  push:
    branches: [main]

env:
  PROJECT_ID: defendly
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/defendly/defendly

jobs:
  deploy-agents:
    name: Deploy Agent Service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push agents image
        run: |
          docker build --platform linux/amd64 \
            -t ${{ env.REGISTRY }}/agents:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/agents:latest \
            ./agents
          docker push ${{ env.REGISTRY }}/agents:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/agents:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy defendly-agents \
            --image ${{ env.REGISTRY }}/agents:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --timeout 300 \
            --service-account ${{ secrets.GCP_SERVICE_ACCOUNT }} \
            --set-env-vars "GOOGLE_PROJECT_ID=${{ env.PROJECT_ID }},VERTEX_AI_LOCATION=${{ env.REGION }},GEMINI_MODEL=gemini-2.0-flash,GCS_BUCKET=defendly-submissions"

  deploy-backend:
    name: Deploy Backend API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push backend image
        run: |
          docker build --platform linux/amd64 \
            -t ${{ env.REGISTRY }}/backend:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/backend:latest \
            ./backend
          docker push ${{ env.REGISTRY }}/backend:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/backend:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy defendly-api \
            --image ${{ env.REGISTRY }}/backend:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --memory 1Gi \
            --timeout 300 \
            --service-account ${{ secrets.GCP_SERVICE_ACCOUNT }} \
            --set-env-vars "GOOGLE_PROJECT_ID=${{ env.PROJECT_ID }},VERTEX_AI_LOCATION=${{ env.REGION }},GEMINI_MODEL=gemini-2.0-flash,GCS_BUCKET=defendly-submissions,AGENT_SERVICE_URL=https://defendly-agents-513251403701.us-central1.run.app,FRONTEND_URL=https://defendly.web.app,GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }},GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }},GOOGLE_CALENDAR_REFRESH_TOKEN=${{ secrets.GOOGLE_CALENDAR_REFRESH_TOKEN }},BASE_URL=https://defendly-api-513251403701.us-central1.run.app"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: defendly

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build
        env:
          VITE_API_URL: https://defendly-api-513251403701.us-central1.run.app
          VITE_SOCKET_URL: https://defendly-api-513251403701.us-central1.run.app

      - name: Install Firebase tools
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: cd frontend && firebase deploy --only hosting --project defendly
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}